name: NSE BTST Daily Signals

on:
  schedule:
    - cron: '30 15 * * 1-5'   # Mon-Fri 9:00 PM IST (15:30 UTC)
  workflow_dispatch:
    inputs:
      force_rebuild_db:
        description: 'Force rebuild db/ from scratch (true/false)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore db/ cache
        id: db-cache
        uses: actions/cache@v4
        with:
          path: db/
          key: db-${{ runner.os }}-${{ hashFiles('bhav_data/**') }}
          restore-keys: |
            db-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy pyarrow requests

      - name: Fetch Today's Bhavcopy
        id: fetch-bhav
        run: python src/nse_bhavcopy_fetch.py

      - name: Step 1 - Consolidate CSVs
        if: >-
          ${{
            github.event.inputs.force_rebuild_db == 'true' ||
            steps.db-cache.outputs.cache-hit != 'true' ||
            steps.fetch-bhav.outputs.new_file == 'true'
          }}
        run: python src/01_consolidate_csv.py

      - name: Step 2 - Filter EQ Series
        if: >-
          ${{
            github.event.inputs.force_rebuild_db == 'true' ||
            steps.db-cache.outputs.cache-hit != 'true' ||
            steps.fetch-bhav.outputs.new_file == 'true'
          }}
        run: python src/02_filter_eq.py

      - name: Step 3 - Compute ATH
        if: >-
          ${{
            github.event.inputs.force_rebuild_db == 'true' ||
            steps.db-cache.outputs.cache-hit != 'true' ||
            steps.fetch-bhav.outputs.new_file == 'true'
          }}
        run: python src/03_find_ath.py

      - name: Step 4 - Run Daily Signals
        run: python src/04_run_daily_signals.py

      - name: Step 5 - Build Dashboard
        run: python src/05_build_dashboard.py

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bhav_data/ output/ docs/ db/ || true
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "signals: $(TZ='Asia/Kolkata' date +'%d-%b-%Y %H:%M IST')"
          git pull --rebase origin main || true
          git push origin HEAD:main
