name: NSE BTST Daily Signals

on:
  schedule:
    - cron: '30 15 * * 1-5'   # 9:00 PM IST = 15:30 UTC Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests pyarrow openpyxl

      - name: Download today's bhavcopy
        run: python src/nse_bhavcopy_fetch.py

      - name: Step 1 - Consolidate bhavcopy data
        run: python src/01_consolidate_csv.py

      - name: Step 2 - Filter EQ data
        run: python src/02_filter_eq.py

      - name: Step 3 - Compute ATH
        run: python src/03_find_ath.py

      - name: Step 4 - Run daily signals (today only)
        run: python src/04_run_daily_signals.py

      - name: Step 5 - Run simulation & generate Excel
        run: python src/05_run_simulation.py

      - name: Fetch latest Nifty index data
        run: |
          mkdir -p docs/data
          curl -sf "https://spurandhar0.github.io/nse-btst-dashboard/nifty_index.json" \
            -o docs/data/nifty_index.json \
            && echo "Fetched nifty_index.json" \
            || echo "Failed to fetch nifty_index.json (using existing)"

      - name: Step 6 - Build dashboard
        run: python src/05_build_dashboard.py

      - name: Push dashboard to public repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python - <<'PYEOF'
import subprocess, os, sys
pat = os.environ['GH_PAT']
run = lambda cmd: subprocess.run(cmd, shell=True, check=True)
# Read generated files
import base64, requests, json
from pathlib import Path

HEADERS = {"Authorization": f"token {pat}", "Accept": "application/vnd.github.v3+json"}
PUB_REPO = "spurandhar0/nse-btst-signals-dashboard"

def push_file(repo_path, local_path):
    with open(local_path, 'rb') as f:
        content = f.read()
    r = requests.get(f"https://api.github.com/repos/{repo_path}/contents/{local_path}", headers=HEADERS)
    sha = r.json().get('sha','') if r.status_code == 200 else ''
    payload = {"message": f"Dashboard update: {local_path}", "content": base64.b64encode(content).decode()}
    if sha: payload["sha"] = sha
    r2 = requests.put(f"https://api.github.com/repos/{repo_path}/contents/{local_path}", headers=HEADERS, json=payload)
    print(f"Pushed {local_path}: {r2.status_code}")

push_file(PUB_REPO, "docs/index.html")
push_file(PUB_REPO, "docs/data/sim_results.json")
try:
    push_file(PUB_REPO, "docs/data/nifty_index.json")
except: pass
PYEOF

      - name: Commit private repo data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bhav_data/ db/ output/ docs/data/ || true
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Daily signals + simulation: $(date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push origin HEAD:main
