name: NSE BTST Daily Signals

on:
  schedule:
    - cron: '30 15 * * 1-5'   # 9:00 PM IST = 15:30 UTC Mon–Fri
  workflow_dispatch:

jobs:
  run-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests pyarrow openpyxl

      - name: Step 1 – Consolidate bhavcopy data
        run: python src/01_consolidate_bhav.py

      - name: Step 2 – Filter EQ data
        run: python src/02_filter_eq.py

      - name: Step 3 – Compute ATH
        run: python src/03_compute_ath.py

      - name: Step 4 – Run daily signals
        run: python src/04_run_daily_signals.py

      - name: Step 5 – Run simulation & generate Excel
        run: python src/05_run_simulation.py

      - name: Step 6 – Build dashboard
        run: python src/05_build_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/ output/ docs/index.html docs/data/ || true
          git diff --staged --quiet || git commit -m "Daily signals + simulation: $(date +'%Y-%m-%d')"
          git push
