name: Historical Backfill (Run Once)

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests pyarrow openpyxl

      - name: Step 0 – Bootstrap bhavcopy (Jan 2025 → today)
        run: python src/00_bootstrap_historical.py

      - name: Commit bhavcopy data (partial save)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bhav_data/ || true
          git diff --staged --quiet || git commit -m "Backfill: bhavcopy data Jan2025 → today"
          git push

      - name: Step 1 – Consolidate bhavcopy CSV → parquet
        run: python src/01_consolidate_bhav.py

      - name: Step 2 – Filter EQ series
        run: python src/02_filter_eq.py

      - name: Step 3 – Compute ATH
        run: python src/03_compute_ath.py

      - name: Step 00b – Historical signal backfill (Jan 2025 → today)
        run: python src/00b_historical_backfill.py

      - name: Step 5 – Run simulation & generate Excel files
        run: python src/05_run_simulation.py

      - name: Step 6 – Build dashboard HTML
        run: python src/05_build_dashboard.py

      - name: Commit and push all data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/ output/ docs/index.html docs/data/ || true
          git diff --staged --quiet || git commit -m "Backfill complete: signals + simulation + dashboard $(date +'%Y-%m-%d')"
          git push
