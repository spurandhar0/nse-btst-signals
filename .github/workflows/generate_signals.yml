name: Generate Signals (Historical Backfill)

on:
  workflow_dispatch:
    inputs:
      signal_start_date:
        description: 'Start date for signal scan (YYYY-MM-DD). Default: 2025-01-01'
        required: false
        default: '2025-01-01'
      rebuild_db:
        description: 'Rebuild DB from bhav CSVs? (yes/no). Use yes after new bhav data added.'
        required: false
        default: 'yes'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy pyarrow openpyxl requests

      - name: Step 1 – Consolidate bhavcopy CSVs → parquet
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/01_consolidate_csv.py

      - name: Step 2 – Filter EQ series
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/02_filter_eq.py

      - name: Step 3 – Compute ATH per symbol
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/03_find_ath.py

      - name: Step 4 – Historical signal backfill (all dates)
        run: python src/00b_historical_backfill.py
        env:
          SIGNAL_START_DATE: ${{ github.event.inputs.signal_start_date || '2025-01-01' }}

      - name: Step 5 – Run simulation & generate per-config Excel files
        run: python src/05_run_simulation.py

      - name: Step 6 – Build dashboard HTML
        run: python src/05_build_dashboard.py

      - name: Push dashboard to public repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd /tmp
          git clone https://x-access-token:${GH_PAT}@github.com/spurandhar0/nse-btst-signals-dashboard.git pub-dashboard
          mkdir -p pub-dashboard/docs/data
          cp $GITHUB_WORKSPACE/docs/index.html pub-dashboard/docs/index.html
          cp $GITHUB_WORKSPACE/docs/data/sim_results.json pub-dashboard/docs/data/sim_results.json
          [ -f "$GITHUB_WORKSPACE/docs/data/nifty_index.json" ] && cp $GITHUB_WORKSPACE/docs/data/nifty_index.json pub-dashboard/docs/data/nifty_index.json || true
          cd pub-dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "Nothing to push to public repo" || git commit -m "Dashboard update: $(date +'%Y-%m-%d')"
          git push origin main

      - name: Commit private repo data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/ output/ docs/data/ || true
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Backfill signals + simulation + dashboard: $(date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push origin HEAD:main
