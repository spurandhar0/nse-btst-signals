name: Generate Signals (Historical Backfill)

on:
  workflow_dispatch:
    inputs:
      signal_start_date:
        description: 'Start date for signal scan (YYYY-MM-DD). Default: 2025-01-01'
        required: false
        default: '2025-01-01'
      rebuild_db:
        description: 'Rebuild DB from bhav CSVs? (yes/no). Use yes after new bhav data added.'
        required: false
        default: 'yes'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy pyarrow openpyxl requests

      - name: Step 1 – Consolidate bhavcopy CSVs → parquet
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/01_consolidate_csv.py

      - name: Step 2 – Filter EQ series
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/02_filter_eq.py

      - name: Step 3 – Compute ATH per symbol
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/03_find_ath.py

      - name: Step 4 – Historical signal backfill (all dates)
        run: python src/00b_historical_backfill.py
        env:
          SIGNAL_START_DATE: ${{ github.event.inputs.signal_start_date || '2025-01-01' }}

      - name: Step 5 – Run simulation & generate per-config Excel files
        run: python src/05_run_simulation.py

      - name: Step 6 – Build dashboard HTML
        run: python src/05_build_dashboard.py

      - name: Push dashboard to public repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python - <<'PYEOF'
import subprocess, os, base64, requests
from pathlib import Path

pat = os.environ['GH_PAT']
HEADERS = {"Authorization": f"token {pat}", "Accept": "application/vnd.github.v3+json"}
PUB_REPO = "spurandhar0/nse-btst-signals-dashboard"

def push_file(repo_path, local_path):
    with open(local_path, 'rb') as f:
        content = f.read()
    r = requests.get(f"https://api.github.com/repos/{repo_path}/contents/{local_path}", headers=HEADERS)
    sha = r.json().get('sha','') if r.status_code == 200 else ''
    payload = {"message": f"Dashboard update: {local_path}", "content": base64.b64encode(content).decode()}
    if sha: payload["sha"] = sha
    r2 = requests.put(f"https://api.github.com/repos/{repo_path}/contents/{local_path}", headers=HEADERS, json=payload)
    print(f"Pushed {local_path}: {r2.status_code}")

push_file(PUB_REPO, "docs/index.html")
push_file(PUB_REPO, "docs/data/sim_results.json")
try:
    push_file(PUB_REPO, "docs/data/nifty_index.json")
except: pass
PYEOF

      - name: Commit private repo data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/ output/ docs/data/ || true
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Backfill signals + simulation + dashboard: $(date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push origin HEAD:main
