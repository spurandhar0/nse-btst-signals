name: Generate Signals (Historical Backfill)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate_signals.yml'
  workflow_dispatch:
    inputs:
      signal_start_date:
        description: 'Start date for signal scan (YYYY-MM-DD)'
        required: false
        default: '2025-01-01'
      rebuild_db:
        description: 'Rebuild DB from bhav CSVs? (yes/no)'
        required: false
        default: 'yes'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy pyarrow openpyxl requests

      - name: Step 1 – Consolidate bhavcopy CSVs → parquet
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/01_consolidate_csv.py

      - name: Cleanup raw bhav CSVs (keep repo small)
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: |
          find bhav_data/ -name "*.csv" -delete || true
          echo "Bhav CSVs removed"

      - name: Step 2 – Precompute indicators
        if: ${{ github.event.inputs.rebuild_db != 'no' }}
        run: python src/02_precompute_indicators.py

      - name: Fetch Latest Nifty Indices
        run: |
          mkdir -p docs/data
          python -c "
          import requests, json
          headers = {'User-Agent': 'Mozilla/5.0'}
          try:
              res = requests.get('https://www.nseindia.com/api/allIndices', headers=headers, timeout=10)
              data = res.json().get('data', [])
              with open('docs/data/nifty_index.json', 'w') as f:
                  json.dump(data, f)
              print('✅ Nifty indices updated')
          except Exception as e:
              print(f'⚠️ Failed to fetch Nifty indices: {e}')
          " || true

      - name: Set start date
        id: set_date
        run: |
          if [ "${{ github.event.inputs.signal_start_date }}" != "" ]; then
            echo "START_DATE=${{ github.event.inputs.signal_start_date }}" >> $GITHUB_ENV
          else
            echo "START_DATE=2025-01-01" >> $GITHUB_ENV
          fi

      - name: Step 3 – Generate signals (C1..C4)
        run: |
          python src/03_generate_signals.py --config C1 --start ${{ env.START_DATE }}
          python src/03_generate_signals.py --config C2 --start ${{ env.START_DATE }}
          python src/03_generate_signals.py --config C3 --start ${{ env.START_DATE }}
          python src/03_generate_signals.py --config C4 --start ${{ env.START_DATE }}

      - name: Step 4 – Compile daily picks
        run: python src/04_compile_daily_picks.py

      - name: Step 5 – Run simulation
        run: |
          python src/05_run_simulation.py

      - name: Dashboard repo update
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd /tmp
          # Clone the public dashboard repo
          git clone https://x-access-token:${GH_PAT}@github.com/spurandhar0/nse-btst-signals-dashboard.git pub-dashboard
          
          # Create the data directory in the root of the dashboard repo
          mkdir -p pub-dashboard/data
          
          # Safely copy only the JSON data files
          cp $GITHUB_WORKSPACE/docs/data/sim_results.json pub-dashboard/data/sim_results.json || true
          cp $GITHUB_WORKSPACE/docs/data/trade_ohlc.json pub-dashboard/data/trade_ohlc.json || true
          cp $GITHUB_WORKSPACE/docs/data/nifty_index.json pub-dashboard/data/nifty_index.json || true
          
          cd pub-dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Track and commit the data folder
          git add data/
          git diff --staged --quiet && echo "Nothing to push to public repo" || git commit -m "Dashboard data update: $(date +'%Y-%m-%d')"
          git push origin main || echo "Failed to push to public repo"

      - name: Commit private repo data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/ output/ docs/ || true
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Auto-update DB & results: $(date +'%Y-%m-%d')"
          git push origin main
